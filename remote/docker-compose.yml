services:
  node_exporter:
    image: prom/node-exporter:v1.7.0
    network_mode: host
    pid: host
    restart: always
    volumes:
      - /:/host:ro,rslave
    command:
      - "--path.rootfs=/host"
      - "--web.listen-address=:19100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    network_mode: host
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--port=18080"
    privileged: true

  vmagent:
    image: victoriametrics/vmagent:v1.137.0
    network_mode: host
    depends_on:
      - node_exporter
      - cadvisor
    volumes:
      - ./prometheus.yml.template:/etc/prometheus/prometheus.template.yml:ro
    env_file:
      - .env
    environment:
      REMOTE_NAME: ${REMOTE_NAME:?set REMOTE_NAME in .env}
      CENTRAL_URL: ${CENTRAL_URL:?set CENTRAL_URL in .env}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        sed "s#__REMOTE_NAME__#$${REMOTE_NAME}#g" /etc/prometheus/prometheus.template.yml > /tmp/prometheus.yml
        exec /vmagent-prod \
          -promscrape.config=/tmp/prometheus.yml \
          -httpListenAddr=:18429 \
          -remoteWrite.url=$${CENTRAL_URL}/api/v1/write \
          -remoteWrite.label=host=$${REMOTE_NAME}
    restart: always
