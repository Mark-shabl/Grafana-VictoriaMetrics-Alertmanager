global:
  scrape_interval: 15s

scrape_configs:
  - job_name: node_exporter
    static_configs:
      - targets:
          - 127.0.0.1:19100
        labels:
          env: remote

  - job_name: cadvisor
    static_configs:
      - targets:
          - 127.0.0.1:18080
        labels:
          env: remote
