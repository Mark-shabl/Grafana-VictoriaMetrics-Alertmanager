global:
  scrape_interval: 10s

scrape_configs:
  - job_name: node_exporter
    static_configs:
      - targets:
          - host.docker.internal:9100
        labels:
          env: central
          host: central

  - job_name: cadvisor
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          env: central
          host: central

  - job_name: vmagent
    static_configs:
      - targets:
          - vmagent:8429
  - job_name: vmalert
    static_configs:
      - targets:
          - vmalert:8880
  - job_name: victoriametrics
    static_configs:
      - targets:
          - victoriametrics:8428
