name: central

# json-file: capped per container; host journald retention is configured separately.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "7"
    compress: "true"

services:
  node_exporter:
    logging: *default-logging
    image: prom/node-exporter:v1.7.0
    network_mode: host
    pid: host
    restart: always
    volumes:
      - /:/host:ro,rslave
    command:
      - "--path.rootfs=/host"

  cadvisor:
    logging: *default-logging
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    network_mode: host
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    privileged: true

  # SNMP → Prometheus для RouterOS/MikroTik (dashboard 14857); community из .env (см. .env.example).
  snmp_exporter:
    logging: *default-logging
    image: prom/snmp-exporter:v0.29.0
    ports:
      - "127.0.0.1:9116:9116"
    env_file:
      - .env
    environment:
      SNMP_COMMUNITY: ${MIKROTIK_SNMP_COMMUNITY:-public}
    volumes:
      - ./snmp_exporter/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: always

  # RouterOS API → Prometheus (MKTXP); хост API из .env (домен). Порт только localhost.
  mktxp:
    logging: *default-logging
    image: ghcr.io/akpw/mktxp:latest
    user: root
    ports:
      - "127.0.0.1:49090:49090"
    env_file:
      - .env
    environment:
      MIKROTIK_API_HOST: ${MIKROTIK_API_HOST:-mikrotik.lan}
      MIKROTIK_API_PORT: ${MIKROTIK_API_PORT:-8728}
      MKTXP_PROFILE: ${MKTXP_PROFILE:-full}
      MKTXP_USE_SSL: ${MKTXP_USE_SSL:-False}
      MKTXP_PLAINTEXT_LOGIN: ${MKTXP_PLAINTEXT_LOGIN:-True}
      MKTXP_ROUTER_SECTION: ${MKTXP_ROUTER_SECTION:-CRS326}
      MIKROTIK_API_USER: ${MIKROTIK_API_USER:-}
      MIKROTIK_API_PASSWORD: ${MIKROTIK_API_PASSWORD:-}
    volumes:
      - ./mktxp/entrypoint.sh:/entrypoint.sh:ro
      - ./mktxp/render-config.py:/render-config.py:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: always

  vmagent:
    logging: *default-logging
    image: victoriametrics/vmagent:v1.137.0
    depends_on:
      - mktxp
      - snmp_exporter
      - node_exporter
      - cadvisor
      - victoriametrics
    network_mode: host
    env_file:
      - .env
    environment:
      MIKROTIK_SNMP_TARGET: ${MIKROTIK_SNMP_TARGET:-mikrotik.lan}
    volumes:
      - vmagentdata:/vmagentdata
      - ./vmagent/prometheus.yml.template:/etc/prometheus/prometheus.template.yml:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        sed "s#__MIKROTIK_SNMP_TARGET__#$${MIKROTIK_SNMP_TARGET}#g" \
          /etc/prometheus/prometheus.template.yml > /tmp/prometheus.yml
        exec /vmagent-prod \
          -promscrape.config=/tmp/prometheus.yml \
          -remoteWrite.url=http://127.0.0.1:8428/api/v1/write
    restart: always

  victoriametrics:
    logging: *default-logging
    image: victoriametrics/victoria-metrics:v1.137.0
    ports:
      - 8428:8428
      - 8089:8089
      - 8089:8089/udp
      - 2003:2003
      - 2003:2003/udp
      - 4242:4242
    volumes:
      - vmdata:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30d"
      - "--graphiteListenAddr=:2003"
      - "--opentsdbListenAddr=:4242"
      - "--httpListenAddr=:8428"
      - "--influxListenAddr=:8089"
      # cAdvisor на контейнерах с кучей LABEL в образе может давать >40 лейблов на ряд (см. container_* blkio)
      - "--maxLabelsPerTimeseries=64"
    restart: always

  grafana:
    logging: *default-logging
    image: grafana/grafana:12.2.0
    depends_on:
      - victoriametrics
    ports:
      - 3000:3000
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: always

  vmalert:
    logging: *default-logging
    image: victoriametrics/vmalert:v1.137.0
    depends_on:
      - victoriametrics
      - alertmanager
    ports:
      - 8880:8880
    volumes:
      - ./rules/alerts.yml:/etc/alerts/alerts.yml
      - ./rules/alerts-health.yml:/etc/alerts/alerts-health.yml
      - ./rules/alerts-vmagent.yml:/etc/alerts/alerts-vmagent.yml
      - ./rules/alerts-vmalert.yml:/etc/alerts/alerts-vmalert.yml
    command:
      - "--datasource.url=http://victoriametrics:8428/"
      - "--remoteRead.url=http://victoriametrics:8428/"
      # vmalert сам добавляет /api/v1/write; полный путь здесь даёт …/write/api/v1/write в логах VM
      - "--remoteWrite.url=http://victoriametrics:8428"
      - "--notifier.url=http://alertmanager:9093/"
      - "--rule=/etc/alerts/*.yml"
      - "--external.url=http://127.0.0.1:3000"
      - '--external.alert.source=explore?orgId=1&left={"datasource":"VictoriaMetrics","queries":[{"expr":{{.Expr|jsonEscape|queryEscape}},"refId":"A"}],"range":{"from":"{{ .ActiveAt.UnixMilli }}","to":"now"}}'
    restart: always

  alertmanager:
    logging: *default-logging
    image: prom/alertmanager:v0.28.1
    volumes:
      - ./alertmanager/alertmanager.yml:/config/alertmanager.yml
    command:
      - "--config.file=/config/alertmanager.yml"
    ports:
      - 9093:9093
    restart: always

volumes:
  vmagentdata: {}
  vmdata: {}
  grafanadata: {}
